<!DOCTYPE html>
<html>
<head>

<title>The Guardian International School System - Result</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

.header{
background:#003366;
color:white;
padding:20px;
}

.logo{
width:120px;
}

.search-box{
margin:30px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

.card{
background:white;
width:600px;
margin:auto;
padding:20px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
margin-top:20px;
}

.student-photo{
width:120px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#003366;
color:white;
}

.total{
font-weight:bold;
background:#f2f2f2;
}

</style>

</head>

<body>

<div class="header">

<img src="logo.png" class="logo"><br>

<h2>The Guardian International School System</h2>

<h3>Hassan Campus</h3>

<h3>Annual Result</h3>

</div>

<div class="search-box">

<input type="text" id="roll" placeholder="Enter Roll Number">

<button onclick="searchResult()">Search Result</button>

</div>

<div id="result"></div>

<script>

let students=[];

fetch("data.json")
.then(res=>res.json())
.then(data=>students=data);

function searchResult(){

let roll=document.getElementById("roll").value.trim();

let s = students.find(x => String(x.roll).trim() === roll);

if(!s){
document.getElementById("result").innerHTML="<h3>Result Not Found</h3>";
return;
}

}

let grandTotal =
s.eng_w_total+
s.urdu_w_total+
s.math_total+
s.gk_total+
s.urdu_r_total+
s.eng_r_total+
s.drawing_total+
s.isl_total+
s.poem_total;

let grandObt =
s.eng_w_obt+
s.urdu_w_obt+
s.math_obt+
s.gk_obt+
s.urdu_r_obt+
s.eng_r_obt+
s.drawing_obt+
s.isl_obt+
s.poem_obt;

document.getElementById("result").innerHTML=`

<div class="card">

<img src="photos/${s.photo}" class="student-photo">

<h3>${s.name}</h3>

<p><b>Father Name:</b> ${s.father}</p>
<p><b>Class:</b> ${s.class}</p>
<p><b>Date of Birth:</b> ${s.dob}</p>

<table>

<tr>
<th>Subject</th>
<th>Total</th>
<th>Obtained</th>
</tr>

<tr><td>English Writing</td><td>${s.eng_w_total}</td><td>${s.eng_w_obt}</td></tr>
<tr><td>Urdu Writing</td><td>${s.urdu_w_total}</td><td>${s.urdu_w_obt}</td></tr>
<tr><td>Maths</td><td>${s.math_total}</td><td>${s.math_obt}</td></tr>
<tr><td>GK</td><td>${s.gk_total}</td><td>${s.gk_obt}</td></tr>
<tr><td>Urdu Reading</td><td>${s.urdu_r_total}</td><td>${s.urdu_r_obt}</td></tr>
<tr><td>English Reading</td><td>${s.eng_r_total}</td><td>${s.eng_r_obt}</td></tr>
<tr><td>Drawing</td><td>${s.drawing_total}</td><td>${s.drawing_obt}</td></tr>
<tr><td>Islamiyat/Naazra</td><td>${s.isl_total}</td><td>${s.isl_obt}</td></tr>
<tr><td>Poems/Sensorial</td><td>${s.poem_total}</td><td>${s.poem_obt}</td></tr>

<tr class="total">

<td>Grand Total</td>

<td>${grandTotal}</td>

<td>${grandObt}</td>

</tr>

</table>

</div>
`;

}

</script>

</body>
</html>
