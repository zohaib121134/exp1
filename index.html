<!DOCTYPE html>
<html>
<head>

<title>The Guardian International School System - Result</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

.header{
background:#003366;
color:white;
padding:20px;
}

.logo{
width:120px;
}

.search-box{
margin:30px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

.card{
background:white;
width:600px;
margin:auto;
padding:20px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
margin-top:20px;
}

.student-photo{
width:120px;
border-radius:10px;
}

.total{
font-weight:bold;
background:#f2f2f2;
}

</style>

</head>

<body>

<div class="header">

<img src="logo.png" class="logo"><br>

<h2>The Guardian International School System</h2>

<h3>Hassan Campus</h3>

<h3>Annual Result</h3>

</div>

<div class="search-box">

<input type="text" id="roll" placeholder="Enter Roll Number">

<button onclick="searchResult()">Search Result</button>

</div>

<div id="result"></div>

<script>

let students=[];

fetch("data.json")
.then(res=>res.json())
.then(data=>students=data);

function searchResult(){

let roll=document.getElementById("roll").value.trim();

let s = students.find(x => x.roll == roll);

if(!s){
document.getElementById("result").innerHTML="<h3>Result Not Found</h3>";
return;
}

let grandTotal =
Number(s.eng_w_total) +
Number(s.urdu_w_total) +
Number(s.math_total) +
Number(s.gk_total) +
Number(s.urdu_r_total) +
Number(s.eng_r_total) +
Number(s.drawing_total) +
Number(s.isl_total) +
Number(s.poem_total);

let grandObt =
Number(s.eng_w_obt) +
Number(s.urdu_w_obt) +
Number(s.math_obt) +
Number(s.gk_obt) +
Number(s.urdu_r_obt) +
Number(s.eng_r_obt) +
Number(s.drawing_obt) +
Number(s.isl_obt) +
Number(s.poem_obt);

let percentage = (grandObt / grandTotal) * 100;

let grade="";
let remarks="";

if (percentage >= 95){
grade="A+";
remarks="Fabulous, Excellent! Congratulations, student promoted to next class.";
}
else if (percentage >= 90){
grade="A";
remarks="Excellent! Congratulations, student promoted to next class.";
}
else if (percentage >= 85){
grade="B+";
remarks="Very Good! Congratulations, student promoted to next class.";
}
else if (percentage >= 80){
grade="B";
remarks="Very Good! Congratulations, student promoted to next class.";
}
else if (percentage >= 70){
grade="C";
remarks="Good! Student promoted to next class.";
}
else if (percentage >= 40){
grade="U";
remarks="Pass! Student promoted to next class.";
}
else{
grade="F";
remarks="Fail.";
}

document.getElementById("result").innerHTML = `

<div class="card">

<img src="photos/${s.photo}" class="student-photo">

<h3>${s.name}</h3>

<p><b>Father Name:</b> ${s.father}</p>
<p><b>Class:</b> ${s.class}</p>
<p><b>Date of Birth:</b> ${s.dob}</p>

<h3>Grand Total: ${grandTotal}</h3>
<h3>Obtained: ${grandObt}</h3>
<h3>Percentage: ${percentage.toFixed(2)}%</h3>
<h3>Grade: ${grade}</h3>

<p><b>Remarks:</b> ${remarks}</p>

</div>
`;

}

</script>

</body>
</html>
